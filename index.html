    gap:12px;
    margin-bottom:25px;
}

.test-btn {
    padding:14px;

}

    justify-content:space-between;
    gap:15px;
    font-size:19px;
    font-weight:bold;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.progressbar {
    height:16px;
    background:#dbe4f0;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress {
    height:100%;
    width:0%;
    background:#2563eb;
}

.question {
    font-size:25px;
    margin-bottom:24px;
    line-height:1.45;
}

.option {
    background:#f3f6fb;
    padding:17px;
    margin-bottom:14px;
    border-radius:14px;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.2s;
    font-size:18px;
}

.option:hover {
    background:#e9f0ff;
    border-color:#2563eb;
}

.correct {
    background:#bbf7d0 !important;
    border-color:#22c55e !important;
}

.wrong {
    background:#fecaca !important;
    border-color:#ef4444 !important;
}

.next-btn, .restart-btn {
    margin-top:20px;
    padding:14px 24px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.next-btn {
    display:none;
}

.result {
    text-align:center;
    padding:35px;
}

.score {
    font-size:52px;
    font-weight:bold;
    color:#1d4ed8;
    margin:20px 0;
}

.small {
    color:#475569;
    font-size:16px;
}
</style>
</head>

},

correct: 1
},
{

options: ["50 г","20 г","30 г","200г"],

},

},
{

{

{

const QUESTIONS_PER_TEST = 50;
const tests = [];

for(let i = 0; i < allQuestions.length; i += QUESTIONS_PER_TEST) {
    tests.push(allQuestions.slice(i, i + QUESTIONS_PER_TEST));
}

let selectedTest = 0;
let current = 0;
let score = 0;
let answered = false;
let sec = 0;
let timerInterval = null;
let activeQuestions = [];

function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function buildMenu() {
    const menu = document.getElementById("testMenu");
    let html = "";

    tests.forEach((test, index) => {
        html += `
        <button class="test-btn" id="testBtn${index}" onclick="startTest(${index})">
            ${index + 1} тест<br>
            <span class="small">${test.length} сұрақ</span>
        </button>`;
    });

    menu.innerHTML = html;
}

function startTest(index) {
    selectedTest = index;
    current = 0;
    score = 0;
    answered = false;
    sec = 0;

    activeQuestions = shuffleArray([...tests[index]]);

    document.querySelectorAll(".test-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById("testBtn" + index).classList.add("active");

    document.getElementById("timer").innerText = "00:00";

    if(timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        sec++;
        let m = String(Math.floor(sec / 60)).padStart(2, "0");
        let s = String(sec % 60).padStart(2, "0");
        document.getElementById("timer").innerText = m + ":" + s;
    }, 1000);

    document.getElementById("quiz").innerHTML = `
        <div class="question" id="question"></div>
        <div id="options"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Келесі сұрақ</button>
    `;

    loadQuestion();
}

function loadQuestion() {
    answered = false;

    if(current >= activeQuestions.length) {
        showResult();
        return;
    }

    const q = activeQuestions[current];

    document.getElementById("testName").innerText =
        (selectedTest + 1) + " тест";

    document.getElementById("counter").innerText =
        "Сұрақ " + (current + 1) + " / " + activeQuestions.length;

    document.getElementById("progress").style.width =
        ((current / activeQuestions.length) * 100) + "%";

    document.getElementById("question").innerText = q.question;

    const labels = ["A", "B", "C", "D"];
    let html = "";

    q.options.forEach((opt, index) => {
        html += `
        <div class="option" onclick="checkAnswer(${index}, this)">
            <b>${labels[index]}.</b> ${opt}
        </div>`;
    });

    document.getElementById("options").innerHTML = html;
    document.getElementById("nextBtn").style.display = "none";
}

function checkAnswer(index, element) {
    if(answered) return;

    answered = true;

    const q = activeQuestions[current];
    const options = document.querySelectorAll(".option");

    options.forEach(o => o.style.pointerEvents = "none");

    if(index === q.correct) {
        element.classList.add("correct");
        score++;
    } else {
        element.classList.add("wrong");
        options[q.correct].classList.add("correct");
    }

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
    current++;
    loadQuestion();
}

function showResult() {
    if(timerInterval) clearInterval(timerInterval);

    document.getElementById("progress").style.width = "100%";

    let percent = Math.round((score / activeQuestions.length) * 100);
    let grade = "";

    if(percent >= 90) grade = "Өте жақсы";
    else if(percent >= 70) grade = "Жақсы";
    else if(percent >= 50) grade = "Қанағаттанарлық";
    else grade = "Қайта тапсыру керек";

    document.getElementById("quiz").innerHTML = `
    <div class="result">
        <h1>${selectedTest + 1} тест аяқталды</h1>
        <div class="score">${score} / ${activeQuestions.length}</div>
        <h2>${percent}%</h2>
        <h2>Баға: ${grade}</h2>
        <p>Уақыт: ${document.getElementById("timer").innerText}</p>
        <button class="restart-btn" onclick="startTest(selectedTest)">Қайта тапсыру</button>
    </div>`;
}

buildMenu();
startTest(0);

</script>
